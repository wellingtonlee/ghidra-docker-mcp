services:
  ghidra-mcp:
    build: .
    # Uncomment to force x86_64 emulation on Apple Silicon (slower but avoids arm64 issues):
    # platform: linux/amd64
    stdin_open: true
    volumes:
      - ./binaries:/home/ghidra/binaries:ro
      - ghidra-projects:/home/ghidra/projects
    deploy:
      resources:
        limits:
          memory: 4g
    environment:
      - GHIDRA_ANALYSIS_TIMEOUT_SECONDS=300
      - GHIDRA_MAX_HEAP=2g

volumes:
  ghidra-projects:

